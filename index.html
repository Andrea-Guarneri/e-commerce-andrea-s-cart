<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font (Roboto) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="index.css">

    <!-- Tailwind CSS  -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Favicon standard -->
    <link rel="icon" href="assets/logos/andreas-cart-logo.png" type="image/x-icon">

    <title>Andrea's Cart</title>
</head>

<body class="font-[Roboto] font-sans">

    <!-- Header -->
    <header class="bg-gray-800 h-full max-h-24 flex items-center py-4">
        <!-- Header container -->
        <div class="flex h-full w-full justify-between container mx-auto px-4 items-center">

            <!-- Logo -->
            <div class="flex h-full items-center h-20">
                <a href="" class="flex h-16">
                    <img src="./assets/logos/andreas-cart-logo-orange.png" alt="" class="h-full w-full object-cover">
                </a>
            </div>


            <!-- Right Navbar -->
            <div class="flex items-center">
                <div class=" h-10 flex gap-x-4 items-center">

                    <!-- Searchbar -->
                    <div class="hidden md:flex h-full items-center py-2 rounded-full bg-white gap-2 ">
                        <div class="bg-orange-500 px-4 py-2 cursor-pointer rounded-l-full">
                            <img src="./assets/icons/search.png"
                                class="h-6 cursor-pointer rounded-l hover:scale-110 transition-all duration-5" alt="">
                        </div>
                        <input type="text" placeholder="Search for a product" class="bg-transparent outline-none">
                    </div>

                    <!-- Favorite -->
                    <img src="./assets/icons/star-gold-favorite.png"
                        class="hidden md:flex h-full cursor-pointer hover:scale-110 transition-all duration-5" alt="">

                    <!-- Cart -->
                    <img src="./assets/icons/cart.png"
                        class="h-full  cursor-pointer hover:scale-110 transition-all duration-5" alt="">

                    <!-- User -->
                    <img src="./assets/icons/user.png"
                        class="h-full cursor-pointer hover:scale-110 transition-all duration-5" alt="">

                    <!-- Dropdown -->
                    <img src="./assets/icons/menu.png"
                        class="h-full xl:hidden cursor-pointer hover:scale-110 transition-all duration-5" alt="">
                </div>
            </div>
        </div>
    </header>


</body>

</html>
